# Agent Skills Configuration

# Skills to link globally (~/.pi/agent/skills/)
# Used for bootstrapping a new machine
global_skills:
  # ClawdHub skills
  - tavily-search

  # Local skills
  - github
  - safari-cli
  - skill-manager
  - vscode

# Prompts to link globally (~/.pi/agent/prompts/)
global_prompts:
  - commit
  - pr-review
  - recent-changes

# Extensions to link globally (~/.pi/agent/extensions/)
global_extensions:
  - infra-guard

# GitHub-hosted skills
github_skills:
  - https://github.com/modem-dev/hunk/tree/main/skills/hunk-review
  - https://github.com/vm0-ai/vm0-skills/blob/main/plausible/SKILL.md
  - https://github.com/badlogic/pi-skills/tree/main/browser-tools
